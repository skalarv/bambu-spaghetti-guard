name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check src tests verification training scripts

      - name: Type-check (mypy)
        run: mypy

      - name: Tests + coverage gate
        run: pytest -q --cov --cov-report=term-missing

      - name: CLI smoke
        run: |
          spaghetti-guard --help
          spaghetti-guard run --help
